- name: "Fairy Tale Villain Monologue"
  text: |
    You think you've won, don't you? Standing there with your righteous sword and your noble heart. How delightfully naive. I've been playing this game since before your grandmother's grandmother was a whisper in the wind. Every move you've made, every clever plan, every supposed victory — all pieces on my board, my dear hero. You see a villain who lost. I see a centuries-old design finally coming to fruition. The curse you think you've broken? It was merely the lock. And you, sweet child, have just handed me the key. Now, if you'll excuse me, I have a kingdom to reshape in my image. Don't look so surprised. In every story, someone has to play the monster. I simply chose to be the very best.
  params:
    temperature: 0.8
    exaggeration: 1.3
    cfg_weight: 0.6
